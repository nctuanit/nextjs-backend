name: Publish to npm

on:
  # Trigger khi push tag dạng v* (ví dụ: v2.1.0)
  push:
    tags:
      - 'v*'
  # Trigger khi tạo GitHub Release
  release:
    types: [created]
  # Cho phép chạy thủ công từ GitHub Actions UI
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (không publish thật)'
        type: boolean
        default: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm provenance
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Verify package version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Publishing version: $VERSION"

      - name: Publish to npm
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run (skip publish)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run — skipping npm publish. Build succeeded."
